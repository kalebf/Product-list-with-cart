<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Product list with cart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-container">
    <!-- Product Section -->
    <section class="products-section">
      <h1>Desserts</h1>
      <div class="products-grid" id="products-grid">
        <!-- Injected via JavaScript -->
      </div>
    </section>

    <!-- Sidebar Cart Section -->
    <aside class="cart-aside">
      <h2>Your Cart (<span id="cart-count">0</span>)</h2>
      
      <!-- Empty Cart State -->
      <div id="empty-cart-view" class="empty-cart">
        <img src="./assets/images/illustration-empty-cart.svg" alt="Empty Cart">
        <p>Your added items will appear here</p>
      </div>

      <!-- Active Cart State -->
      <div id="active-cart-view" class="active-cart hidden">
        <ul id="cart-list" class="cart-list">
          <!-- Injected via JavaScript -->
        </ul>
        <div class="order-total-container">
          <span>Order Total</span>
          <strong id="cart-total-price">$0.00</strong>
        </div>
        <div class="carbon-neutral-msg">
          <img src="./assets/images/icon-carbon-neutral.svg" alt="Carbon Neutral">
          <p>This is a <span>carbon-neutral</span> delivery</p>
        </div>
        <button id="confirm-order-btn" class="btn-confirm">Confirm Order</button>
      </div>
    </aside>
  </main>

  <!-- Order Confirmation Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-content">
      <img src="./assets/images/icon-order-confirmed.svg" alt="Confirmed Checkmark" class="modal-icon">
      <h1>Order Confirmed</h1>
      <p class="modal-subtitle">We hope you enjoy your food!</p>
      
      <div class="modal-summary-box">
        <ul id="modal-summary-list">
          <!-- Injected via JavaScript -->
        </ul>
        <div class="modal-total-container">
          <span>Order Total</span>
          <strong id="modal-total-price">$0.00</strong>
        </div>
      </div>
      <button id="start-new-order-btn" class="btn-new-order">Start New Order</button>
    </div>
  </div>

  <footer class="attribution">
    Challenge by <a href="https://frontendmentor.io" target="_blank">Frontend Mentor</a>. Coded by<a href="#"> Kaleb Flores-Lopez</a>.
  </footer>

  <script src="script.js"></script>
</body>
</html>
